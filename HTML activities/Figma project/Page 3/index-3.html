<!DOCTYPE html>
<html>
    <head>
        <title>Learning English</title>
        <link rel="stylesheet" href="style.css"/>
    </head>

    <body>
        <div id="header-box">
            <div id="logo">
                <img src="Book-icon.png" alt="A green book with thick lineart." width="55px;" height= "55px;" />
                <p id="website-name">Learning English</p>
            </div>
                
            <div id="nav-options">
                <a href="index-2.html" class="none">Parts of speech</a>
                <a href="index-3.html" class="none">Contact forms</a>
            </div>
        </div>

        <div id="content-box">
            <p id="title">Have anything you want to say, contact me!</p>

            <div id="form">
                <form>
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="Name"><br>
                    <label for="surname">Surname:</label><br>
                    <input type="text" id="surname" name="Surname"><br>
                    <label for="email">Email:</label><br>
                    <input type="text" id="email" name="Email"><br>
                    <label for="message">Message:</label><br>
                    <input type="text" id="message" name="Message"><br>
                    <button type="submit" id="send">Send</button>
                </form>
            </div>
        </div>
    </body>
</html>
