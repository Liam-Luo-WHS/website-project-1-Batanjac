<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <title>Task 3 - Semantic Layout Challenge</title> 

    <link rel="stylesheet" href="style.css"> 

</head> 

<body> 

  

    <div class="page-container"> 

  

        <header> 

            <!-- TASK: Add Logo div and Heading 1 here -->
            <div id="Heading 1" style="background-color: rgb(216, 216, 216); padding: 20px; width: 3%;">
                <img src="Logo image" alt="Logo image">
            </div> 

            <p>Heading 1</p>
        </header> 

  

        <nav> 

            <!-- TASK: Create a list for: Home, About Us, Contact Us --> 
            <ul style="text-align: center;">
                <li>Home</li>
                <li>About Us</li>
                <li>Contact Us</li>
            </ul>

        </nav> 

  

        <main class="main-content"> 

            <div style="background-color: rgb(165, 154, 154); width: 20%; margin: auto;">
                <ul>
                    <p>Heading 2</p>
                </ul>
            </div>

            <div style="background-color: rgb(184, 184, 184); width: 20%; margin: auto;">
                <img src= "image" Alt= "Image">

            <!-- TASK: Add the two content boxes (text and image) --> 

        </main> 

  

        <footer style= "text-align: center;"> 

            <ul>
                <li>Who are we?</li>
                <li>Footer info</li>
            </ul>
            <br/>
            <div style= "background-color: rgb(216, 216, 216); width: 25%; margin: auto; height: 20%;">
                <a href= "Instagram.com">Instagram</a> <a href= "Facebook.com">Facebook</a>
            </div>

            <!-- TASK: Add footer info and the social links div --> 

        </footer> 

  

    </div> 

  

</body> 

</html>
