<!DOCTYPE html> 

<html lang="en"> 

<head> 

    <meta charset="UTF-8"> 

    <title>Task 3 - Semantic Layout Challenge</title> 

    <link rel="stylesheet" href="style.css"> 

</head> 

<body> 

  

    <div class="page-container"> 

  

        <header> 

            <!-- TASK: Add Logo div and Heading 1 here --> 
            
            <div style="background-color: lightgrey; width: 3%; padding: 23px;">
                <img src="Logo Image" alt="Logo Image">
            </div>

            <p style="font-size: 18px;">Heading 1</p>

        </header> 

  

        <nav> 

            <!-- TASK: Create a list for: Home, About Us, Contact Us --> 
            <ul>
                <li>Home</li>
                <li>About Us</li>
                <li>Contact Us</li>
            </ul>

        </nav> 

  

        <main class="main-content"> 

            <!-- TASK: Add the two content boxes (text and image) --> 

            <div style="background-color: lightslategrey;">
                <p>Heading 2</p>
                <p>Paragraph of information text</p>
            </div>

            <div style="background-color: lightgrey;">
                <img src="Image" alt="Image">
            </div>

        </main> 

  

        <footer> 

            <!-- TASK: Add footer info and the social links div --> 

            <p>
                Copyright (C) 2026
                Privacy information
                Links
            </p>

            <div style="background-color: lightgrey; width: 30%; margin-top: 35px; padding: 10px;">
                <a href="Youtube.com">Youtube</a>
                <a href="Facebook.com">Facebook</a>
                <a href="Instagram.com">Instagram</a>
                <a href="Snapchat.com">Snapchat</a>
            </div>

        </footer> 

  

    </div> 

  

</body> 

</html>
